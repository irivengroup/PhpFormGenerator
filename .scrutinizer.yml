checks:
  php:
    code_rating: true
    duplication: true

filter:
  excluded_paths:
    - "vendor/*"
    - "docs/*"

build:
  image: default-jammy

  environment:
    variables:
      XDEBUG_MODE: coverage

  nodes:
    analysis:
      environment:
        php:
          version: 8.2

      dependencies:
        override:
          - composer install --no-interaction --prefer-dist --no-progress

      tests:
        override:
          - command: vendor/bin/phpunit --colors=never --coverage-clover=coverage.clover

tools:
  external_code_coverage:
    timeout: 1200
    runs: 1
